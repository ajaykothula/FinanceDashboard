<!DOCTYPE html>
<html>
<head>
    <title>All Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📜 All Transactions</h1>

<a href="/">
    <button>🏠 Back to Dashboard</button>
</a>

<br><br>

<table border="1">
<tr>
    <th>ID</th>
    <th>Date</th>
    <th>Category</th>
    <th>Type</th>
    <th>Amount</th>
    <th>Description</th>
</tr>

{% for t in transactions %}
<tr>
    <td>{{ t[0] }}</td>
    <td>{{ t[1] }}</td>
    <td>{{ t[2] }}</td>
    <td>{{ t[3] }}</td>
    <td>₹{{ t[4] }}</td>
    <td>{{ t[5] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
