<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
</head>
<body>

<h1>Edit Transaction</h1>

<form method="POST">

Date:
<input type="date" name="date" value="{{transaction[1]}}" required>

<br><br>

Category:
<input type="text" name="category" value="{{transaction[2]}}" required>

<br><br>

Type:
<select name="type">
    <option {% if transaction[3]=='Income' %}selected{% endif %}>Income</option>
    <option {% if transaction[3]=='Expense' %}selected{% endif %}>Expense</option>
</select>

<br><br>

Amount:
<input type="number" step="0.01" name="amount" value="{{transaction[4]}}" required>

<br><br>

Description:
<input type="text" name="description" value="{{transaction[5]}}">

<br><br>

<button type="submit">Update</button>

</form>

</body>
</html>
