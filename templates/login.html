<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#2563eb,#7c3aed,#06b6d4,#10b981);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:380px;
    padding:35px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    text-align:center;
    animation:pop .7s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:translateY(60px) scale(.8);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.logo{
    font-size:60px;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h1{
    color:white;
    margin:15px 0 25px;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input:focus{
    outline:none;
    box-shadow:0 0 15px #38bdf8;
}

button{
    width:100%;
    padding:13px;
    margin-top:15px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    background:#16a34a;
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">👤</div>

<h1>Create Account</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Choose Username"
required>

<input
type="password"
name="password"
placeholder="Choose Password"
required>

<button type="submit">
✨ Create Account
</button>

</form>

<br>

<a href="/login">
⬅ Back to Login
</a>

</div>

</body>
</html>
